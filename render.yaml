databases:
  - name: osv-postgres
    databaseName: osv_db
    user: osv_user
    plan: free

services:
  - type: web
    name: osv-backend
    runtime: docker
    plan: free
    dockerContext: ./backend
    dockerfilePath: ./backend/Dockerfile
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: osv-postgres
          property: connectionString
      - key: JWT_SECRET
        sync: false
      - key: APP_URL
        value: https://osv-frontend.onrender.com
      - key: FRONTEND_URL
        value: https://osv-frontend.onrender.com
      - key: CORS_ORIGIN
        value: https://osv-frontend.onrender.com
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: MAIL_FROM
        sync: false

  - type: web
    name: osv-frontend
    runtime: docker
    plan: free
    dockerContext: ./frontend
    dockerfilePath: ./frontend/Dockerfile
    envVars:
      - key: BACKEND_UPSTREAM
        value: https://osv-backend.onrender.com
